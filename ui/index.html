<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LiteLLM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container {
      text-align: center;
      max-width: 480px;
      padding: 2rem;
    }

    .logo {
      font-size: 2.4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
    }

    .logo .lite { color: #e94560; }
    .logo .llm  { color: #0f3460; }

    .subtitle {
      color: #888;
      font-size: 0.95rem;
      margin-bottom: 2rem;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1rem;
      border-radius: 999px;
      font-size: 0.85rem;
      margin-bottom: 2rem;
      background: rgba(255,255,255,0.05);
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #555;
    }

    .dot.running { background: #4caf50; }
    .dot.stopped { background: #e94560; }
    .dot.checking { background: #ff9800; animation: pulse 1s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
    }

    button {
      cursor: pointer;
      border: none;
      border-radius: 8px;
      padding: 0.7rem 2rem;
      font-size: 0.95rem;
      font-weight: 500;
      width: 240px;
      transition: opacity 0.2s;
    }

    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: #e94560;
      color: #fff;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: #ccc;
      border: 1px solid rgba(255,255,255,0.1);
    }

    .info {
      margin-top: 2rem;
      font-size: 0.8rem;
      color: #555;
    }

    .info code {
      background: rgba(255,255,255,0.06);
      padding: 0.15rem 0.4rem;
      border-radius: 4px;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo"><span class="lite">Lite</span><span class="llm">LLM</span></div>
    <p class="subtitle">OpenAI-compatible LLM proxy</p>

    <div class="status">
      <span class="dot checking" id="dot"></span>
      <span id="status-text">Checking...</span>
    </div>

    <div class="actions">
      <button class="btn-primary" id="btn-ui" disabled>Open LiteLLM UI</button>
      <button class="btn-secondary" id="btn-api" disabled>Open API Docs</button>
    </div>

    <p class="info">
      Proxy at <code>http://localhost:4000</code> &middot;
      Key: <code>sk-1234</code>
    </p>
  </div>

  <script>
    const PROXY_URL = "http://localhost:4000";

    const dot = document.getElementById("dot");
    const statusText = document.getElementById("status-text");
    const btnUi = document.getElementById("btn-ui");
    const btnApi = document.getElementById("btn-api");

    function openUrl(url) {
      try {
        // Docker Desktop Extension SDK
        if (window.ddClient) {
          window.ddClient.host.openExternal(url);
          return;
        }
      } catch (_) {}
      window.open(url, "_blank");
    }

    btnUi.addEventListener("click", () => openUrl(PROXY_URL + "/ui"));
    btnApi.addEventListener("click", () => openUrl(PROXY_URL));

    async function checkHealth() {
      try {
        const res = await fetch(PROXY_URL + "/health/liveliness", {
          signal: AbortSignal.timeout(3000),
        });
        if (res.ok) {
          dot.className = "dot running";
          statusText.textContent = "Running";
          btnUi.disabled = false;
          btnApi.disabled = false;
          return;
        }
      } catch (_) {}

      dot.className = "dot stopped";
      statusText.textContent = "Starting...";
      btnUi.disabled = true;
      btnApi.disabled = true;
    }

    checkHealth();
    setInterval(checkHealth, 5000);
  </script>
</body>
</html>
