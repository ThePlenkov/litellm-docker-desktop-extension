services:
  config-server:
    image: litellm/config-server:latest
    ports:
      - "4001:8080"
    volumes:
      - litellm-config:/data
    healthcheck:
      test: ["CMD", "/config-server", "-health-check"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 2s

  litellm:
    image: docker.litellm.ai/berriai/litellm:main-stable
    ports:
      - "4000:4000"
    environment:
      - LITELLM_MASTER_KEY=${LITELLM_MASTER_KEY:-sk-1234}
    command: ["--config", "/data/config.yaml", "--port", "4000"]
    volumes:
      - litellm-config:/data
    depends_on:
      config-server:
        condition: service_healthy

volumes:
  litellm-config:
